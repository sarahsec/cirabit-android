name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Triggers for tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      ALIAS: ${{ secrets.ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Cache Gradle files
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        run: |
          set -euo pipefail
          missing=0
          for var in SIGNING_KEY KEY_STORE_PASSWORD ALIAS KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var is not set in repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure release signing
        run: |
          set -euo pipefail
          mkdir -p keystore
          echo "$SIGNING_KEY" | base64 -d > keystore/cirabit-release.jks
          chmod 600 keystore/cirabit-release.jks
          cat > signing.properties <<EOF
          STORE_FILE=keystore/cirabit-release.jks
          STORE_PASSWORD=$KEY_STORE_PASSWORD
          KEY_ALIAS=$ALIAS
          KEY_PASSWORD=$KEY_PASSWORD
          EOF
          chmod 600 signing.properties

      - name: Build signed release APKs
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: List APK files
        run: |
          echo "APK files built:"
          find app/build/outputs/apk/release -name "*.apk" -type f -exec ls -lh {} \;

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release

          pick_apk() {
            local signed="$1"
            local unsigned="$2"
            local output="$3"
            if [ -f "$signed" ]; then
              cp "$signed" "$output"
              return 0
            fi
            if [ -f "$unsigned" ]; then
              echo "::error::Unsigned APK found: $unsigned"
              exit 1
            fi
            echo "::error::Expected APK not found: $signed"
            exit 1
          }

          APK_DIR="app/build/outputs/apk/release"
          pick_apk "$APK_DIR/app-arm64-v8a-release.apk" "$APK_DIR/app-arm64-v8a-release-unsigned.apk" "release/cirabit-android-arm64.apk"
          pick_apk "$APK_DIR/app-x86_64-release.apk" "$APK_DIR/app-x86_64-release-unsigned.apk" "release/cirabit-android-x86_64.apk"
          pick_apk "$APK_DIR/app-universal-release.apk" "$APK_DIR/app-universal-release-unsigned.apk" "release/cirabit-android-universal.apk"

          if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            cp "app/build/outputs/bundle/release/app-release.aab" "release/cirabit-android.aab"
          fi

          (
            cd release
            sha256sum * > SHA256SUMS.txt
          )

      - name: DEBUG
        run: |
          set -x
          pwd
          ls -all
          cd release
          ls -all
          (tree || ls -R)

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cirabit-android-release-${{ github.ref_name }}
          path: release/*
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: cirabit-android-release-${{ github.ref_name }}
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/cirabit-android-arm64.apk
            release/cirabit-android-x86_64.apk
            release/cirabit-android-universal.apk
            release/cirabit-android.aab
            release/SHA256SUMS.txt
          name: Release ${{ github.ref_name }}
          body: |
            **cirabit-android-arm64.apk** - ARM64 (most phones)
            **cirabit-android-x86_64.apk** - x86_64 (Chromebooks, tablets)
            **cirabit-android-universal.apk** - All architectures (fallback)
            **cirabit-android.aab** - Android App Bundle (Google Play)
            **SHA256SUMS.txt** - Checksums for integrity verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
